name: Test Action

on:
  issues:
    types: [labeled]

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'AutoReadme'
    name: Generate README
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README
        uses: ./
        id: readme
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ai-api-key: ${{ secrets.GEMINI_API_KEY }}
          ai-provider: gemini

      - name: Show outputs
        run: |
          echo "PR URL: ${{ steps.readme.outputs.pull-request-url }}"
          echo "README: ${{ steps.readme.outputs.readme-path }}"
